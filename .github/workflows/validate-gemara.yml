name: Validate Gemara artifacts

# Schema-validates everything in gemara/ on any PR that touches it, so a
# malformed edit can't reach main (or the publish pipeline) unnoticed.
on:
  pull_request:
    paths:
      - "gemara/**"
      - ".github/workflows/validate-gemara.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      GRCLI_VERSION: v0.1.1
      # Gemara CUE spec pinned to the immutable v1.1.0 commit (tags are mutable);
      # the pinned release must match metadata.gemara-version in the YAML artifacts.
      GEMARA_SHA: 7204c37b4fdb65578195b522d20cea0742feb338  # gemaraproj/gemara v1.1.0
      GRCLI_GEMARA_SPEC_DIR: ${{ github.workspace }}/.gemara-spec
    steps:
      - uses: actions/checkout@v4

      - name: Install oras
        uses: oras-project/setup-oras@v1.2.4

      - name: Install grcli
        run: |
          set -euo pipefail
          oras pull "ghcr.io/revanite-io/grcli:${GRCLI_VERSION}" --platform linux/amd64
          sudo install grcli /usr/local/bin/grcli
          grcli --version

      - name: Install cue (required by grcli validate)
        uses: cue-lang/setup-cue@v1.0.1
        with:
          version: v0.16.1

      - name: Fetch Gemara spec
        run: |
          set -euo pipefail
          # Fetch by SHA (immutable), not by tag (mutable).
          git init -q "${GRCLI_GEMARA_SPEC_DIR}"
          git -C "${GRCLI_GEMARA_SPEC_DIR}" fetch --depth 1 -q \
            https://github.com/gemaraproj/gemara.git "${GEMARA_SHA}"
          git -C "${GRCLI_GEMARA_SPEC_DIR}" checkout -q --detach FETCH_HEAD

      - name: Validate artifacts
        run: |
          grcli validate \
            -f gemara/principles.yaml,gemara/vectors.yaml,gemara/guidance.yaml,gemara/aigf-to-nist-mapping.yaml \
            --spec "${GRCLI_GEMARA_SPEC_DIR}"
