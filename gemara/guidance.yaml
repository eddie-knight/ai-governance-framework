  - id: AIR-PREV-018
    group: PREV
    title: Agent Authority Least Privilege Framework
    objective: >
      The Agent Authority Least Privilege Framework implements granular access
      controls ensuring agents can only access APIs, tools, and data strictly
      necessary for their designated functions. This preventive control
      establishes dynamic privilege management, contextual access
      restrictions, and comprehensive authorization enforcement to prevent
      agents from exceeding their intended operational scope and causing
      unauthorized actions or regulatory violations. This framework extends
      traditional least privilege principles to address the unique challenges
      of agentic AI systems, where agents make autonomous decisions about tool
      selection and API usage, requiring more sophisticated controls than
      static role-based access systems.
    rationale:
      importance: >
        Implementing comprehensive agent authority least privilege frameworks
        provides critical security benefits.
      goals:
        - "Attack Surface Reduction: Limits the potential impact of agent compromise by restricting accessible resources and capabilities."
        - "Regulatory Compliance: Ensures agents operate within regulatory boundaries and approval requirements."
        - "Unauthorized Action Prevention: Prevents agents from executing transactions or operations outside their intended scope."
        - "Audit Trail Enhancement: Provides detailed logging and audit capabilities for regulatory and security investigations."
        - "Risk Mitigation: Reduces operational risk by enforcing business rules and approval workflows at the privilege level."
        - "Incident Response Support: Enables rapid containment of security incidents by restricting compromised agent capabilities."
