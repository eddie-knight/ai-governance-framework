  - id: AIR-PREV-005
    group: PREV
    title: System Acceptance Testing
    objective: >
      System Acceptance Testing (SAT) for AI systems is a crucial validation
      phase within a financial institution. Its primary goal is to confirm
      that a developed AI solution rigorously meets all agreed-upon business
      and user requirements, functions as intended from an end-user
      perspective, and is fit for its designated purpose before being deployed
      into any live operational environment. This testing focuses on the
      user's viewpoint and verifies the system's overall operational
      readiness, including its alignment with risk and compliance standards.
    rationale:
      importance: >
        System Acceptance Testing provides critical value for financial
        institutions.
      goals:
        - "Risk Mitigation: Identifies and mitigates operational and reputational risks before deployment"
        - "Compliance Assurance: Provides documented evidence of thorough vetting for regulatory requirements"
        - "User Confidence: Builds trust through stakeholder involvement in validation processes"
        - "Cost Prevention: Prevents expensive post-deployment failures and remediation efforts"
        - "Quality Assurance: Ensures AI systems meet business objectives and performance standards"
    see-also:
      - AIR-DET-015
      - AIR-DET-011
    statements:
      - id: AIR-PREV-005.1
        title: Establishing Clear and Comprehensive Acceptance Criteria
        text: ""
        recommendations:
          - >
            Action: Before testing begins, collaborate with all relevant
            stakeholders – including business owners, end-users, AI
            development teams, operations, risk management, compliance, and
            information security – to define, document, and agree upon clear,
            measurable, and testable acceptance criteria.
          - >
            Considerations for Criteria:; Functional Integrity:; Performance
            and Scalability:; Security and Access Control:; Ethical AI
            Principles & Responsible AI:; Usability and User Experience (UX):;
            Regulatory Compliance and Policy Adherence:; Resilience and Error
            Handling:
      - id: AIR-PREV-005.2
        title: Preparing a Representative Test Environment and Data
        text: ""
        recommendations:
          - >
            Action: Conduct SAT in a dedicated test environment that mirrors
            the intended production environment as closely as possible in
            terms of infrastructure, configurations, and dependencies.
          - >
            Test Data: Utilize comprehensive, high-quality test datasets that
            are representative of the data the AI system will encounter in
            real-world operations. This should include:
      - id: AIR-PREV-005.3
        title: Ensuring Active User Involvement
        text: ""
        recommendations:
          - >
            Action: Actively involve actual end-users, or designated
            representatives who understand the business processes, in the
            execution of test cases and the validation of results.
          - >
            Rationale: Their hands-on participation and feedback are paramount
            to confirming that the system genuinely meets practical business
            needs and usability expectations.
      - id: AIR-PREV-005.4
        title: Systematic Test Execution and Rigorous Documentation
        text: ""
        recommendations:
          - >
            Action: Execute test cases methodically according to a predefined
            test plan, ensuring all acceptance criteria are covered.
          - >
            Documentation: Maintain meticulous records of all testing
            activities:
      - id: AIR-PREV-005.5
        title: Managing Issues and Validating Resolutions
        text: ""
        recommendations:
          - >
            Action: Implement a formal process for reporting, prioritizing,
            tracking, and resolving any defects, gaps, or issues identified
            during SAT.
          - >
            Resolution: Ensure that all critical and high-priority issues are
            satisfactorily addressed, re-tested, and validated before granting
            system acceptance.
      - id: AIR-PREV-005.6
        title: Obtaining Formal Acceptance and Sign-off
        text: ""
        recommendations:
          - >
            Action: Secure a formal, documented sign-off from the designated
            business owner(s) and other key stakeholders (e.g., Head of Risk,
            CISO delegate where appropriate).
          - >
            Significance: This sign-off confirms that the AI system has
            successfully met all acceptance criteria and is approved for
            deployment, acknowledging any accepted risks or limitations.
    principles:
      - reference-id: AIR-PRIN
        entries:
          - reference-id: AIR-PRIN-004
            remarks: Pre-deployment validation is a preventive layer against unsafe releases
          - reference-id: AIR-PRIN-005
            remarks: Documented acceptance criteria and test evidence support auditability
