  - id: AIR-PREV-023
    group: PREV
    title: Agentic System Credential Protection Framework
    objective: >
      The Agentic System Credential Protection Framework implements
      comprehensive security controls to prevent agents from discovering,
      accessing, or exfiltrating authentication credentials, API keys,
      secrets, and other sensitive authentication materials. This preventive
      control establishes credential isolation, secure credential injection
      mechanisms, behavioral monitoring, and zero-trust authentication
      architectures specifically designed to protect against agent-mediated
      credential harvesting while maintaining operational functionality for
      legitimate agent operations. This framework addresses the unique
      challenges of protecting credentials in environments where agents have
      broad system access and autonomous decision-making capabilities,
      requiring specialized controls beyond traditional credential management
      approaches.
    rationale:
      importance: >
        Implementing comprehensive credential protection provides critical
        security benefits.
      goals:
        - "Credential Harvesting Prevention: Prevents agents from being used as vectors for systematic credential discovery and theft."
        - "Infrastructure Protection: Protects the broader technology infrastructure from compromise through harvested credentials."
        - "Lateral Movement Prevention: Limits the ability of compromised agents to enable lateral movement across systems and networks."
        - "Compliance Assurance: Supports regulatory requirements for credential protection and authentication security in financial services."
        - "Incident Containment: Enables rapid detection and containment of credential-related security incidents."
        - "Zero-Trust Architecture: Establishes foundation for zero-trust security architectures that assume potential agent compromise."
    see-also:
      - AIR-PREV-018
      - AIR-PREV-014
