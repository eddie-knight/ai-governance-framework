  - id: AIR-PREV-007
    group: PREV
    title: Legal and Contractual Frameworks for AI Systems
    objective: >
      Robust legal and contractual agreements are essential for governing the
      development, procurement, deployment, and use of AI systems within a
      financial institution. This control ensures that comprehensive
      frameworks are established and maintained to manage risks, define
      responsibilities, protect data, and ensure compliance with legal and
      regulatory obligations when engaging with AI technology vendors, data
      providers, partners, and even in defining terms for end-users. These
      agreements must be thoroughly understood and actively managed to ensure
      adherence to all stipulated requirements.
    rationale:
      importance: >
        Well-drafted legal and contractual frameworks establish clear
        accountability between the institution and third parties, safeguard
        institutional data and intellectual property, and ensure AI
        development and use align with legal, regulatory, and ethical
        obligations.
      goals:
        - "Risk Mitigation: Well-drafted contracts mitigate legal, financial, operational, and reputational risks associated with AI systems"
        - "Clear Accountability: Establishes clear lines of responsibility between the institution and third parties"
        - "Asset Protection: Safeguards the institution's data, intellectual property, and other assets"
        - "Compliance Assurance: Ensures AI system development and use align with legal, regulatory, and ethical obligations"
        - "Responsible AI Support: Contractual requirements mandate practices supporting responsible AI development"
        - "Partnership Foundation: Transparent agreements form the basis of trustworthy relationships with AI vendors"
    see-also:
      - AIR-DET-001
      - AIR-PREV-010
    statements:
      - id: AIR-PREV-007.1
        title: Data Governance, Privacy, and Security
        text: ""
        recommendations:
          - >
            Data Usage and Processing: Clearly define how any data provided to
            or processed by a third party (e.g., prompts, proprietary
            datasets, customer information) will be used, processed, stored,
            and protected. Specifically clarify:
          - >
            Regulatory Compliance: Ensure the agreement mandates compliance
            with all applicable data protection and privacy regulations (e.g.,
            GDPR, CCPA). Address requirements for:
          - >
            Security Standards and Breach Notification: Stipulate required
            information security standards, controls, and certifications.
            Include clear procedures and timelines for notifying the
            institution in the event of a data breach or security incident.
      - id: AIR-PREV-007.2
        title: Intellectual Property (IP) Rights and Indemnification
        text: ""
        recommendations:
          - >
            Training Data Provenance: If the vendor provides pre-trained
            models, seek information regarding the data used for training,
            particularly concerning third-party IP.
          - >
            Indemnity Protections: Does the vendor provide indemnification
            against claims of IP infringement (e.g., if copyrighted materials
            were used without authorization in model training)?
          - >
            Ownership of Outputs and Derivatives: Clearly define ownership of
            AI model outputs, any new IP created (e.g., custom models
            developed using vendor tools), and data derivatives.
          - >
            Licensing Terms: Ensure clarity on licensing terms for AI models,
            software, and tools, including scope of use, restrictions, and any
            dependencies.
      - id: AIR-PREV-007.3
        title: Allocation of Responsibilities, Liabilities, and Risk
        text: ""
        recommendations:
          - >
            Clearly Defined Roles: Explicitly allocate responsibilities for
            the AI system's lifecycle (development, deployment, operation,
            maintenance, decommissioning) between the institution and the
            third party (as per ISO 42001 A.10.2, A.10.3).
          - >
            Liability and Warranties: Address limitations of liability,
            warranties (e.g., regarding performance, accuracy), and any
            disclaimers. Ensure these are appropriate for the risk level of
            the AI application.
      - id: AIR-PREV-007.4
        title: Model Transparency, Explainability, and Data Provenance
        text: ""
        recommendations:
          - >
            Transparency into Model Operation: To the extent feasible and
            permissible, seek rights to understand the AI model's general
            architecture, methodologies, and key operational parameters.
          - >
            Explainability Support: If the AI system is used for decisions
            impacting customers or for regulatory purposes, ensure the
            contract supports the institution's explainability requirements.
          - >
            Information on Training Data: As appropriate, seek information on
            the characteristics and sources of data used to train models
            provided by vendors.
      - id: AIR-PREV-007.5
        title: Service Levels, Performance, and Model Management
        text: ""
        recommendations:
          - >
            Service Level Agreements (SLAs): Define clear SLAs for AI system
            availability, performance metrics (e.g., response times, accuracy
            levels), and support responsiveness.
          - >
            Model Versioning and Change Management: The contract should
            specify the vendor's policy on model versioning, updates, and
            changes. Ensure timely notification of any changes that could
            impact model performance, behavior ("drift"), or compliance,
            allowing the institution to re-validate.
          - >
            Maintenance and Support: Outline provisions for ongoing
            maintenance, technical support, and updates.
    principles:
      - reference-id: AIR-PRIN
        entries:
          - reference-id: AIR-PRIN-002
            remarks: Contracts require classification-aware data handling by third parties
          - reference-id: AIR-PRIN-005
            remarks: Contractual transparency, provenance, and reporting obligations support auditability
