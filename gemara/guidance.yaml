  - id: AIR-PREV-003
    group: PREV
    title: User/App/Model Firewalling
    objective: >
      User/App/Model Firewalling encompasses the set of security controls
      applied at the boundaries between users, applications, AI models,
      and supporting data stores such as RAG databases. When internal
      company information is used to enrich a RAG database, especially if
      this involves processing by external services, this data and the
      external communication pathways must be carefully managed and
      secured. Any proprietary or sensitive information sent to an external
      service for such processing requires rigorous filtering before
      transmission to prevent data leakage.
    rationale:
      importance: >
        Implementing comprehensive user/app/model firewalling provides
        critical security benefits including attack prevention, data
        protection, service availability, reputation protection, and
        compliance support. Firewalling blocks prompt injection attacks
        and malicious inputs before they reach AI models, prevents
        sensitive information leakage through AI outputs or RAG processing,
        and helps meet regulatory requirements for data handling and
        system security.
      goals:
        - "RAG Data Ingestion: Filter sensitive or private data before transmitting internal information to external services for embedding creation"
        - "User Input to AI Model: Detect and block malicious or abusive user inputs such as Prompt Injection attacks"
        - "AI Model Output: Detect excessively long responses, format deviations, evasion patterns, data leakage, and inappropriate content"
    see-also:
      - AIR-PREV-017
      - AIR-PREV-008
      - AIR-DET-015
    statements:
      - id: AIR-PREV-003.1
        title: RAG Data Ingestion Filtering
        text: ""
        recommendations:
          - >
            RAG Database Security: While it's often more practical to
            pre-process and filter data for RAG systems before sending it
            for external embedding creation, organizations might also
            consider in-line filters for real-time checks. Once internal
            information is converted into embeddings and stored in vector
            databases, the data becomes largely opaque to traditional
            security tools.
          - >
            Filtering Efficacy: Static filters based on regular expressions
            or keyword blocklists are effective for well-defined patterns
            but less effective at identifying nuanced issues such as
            generic private information or subtle Prompt Injection attacks.
          - >
            Streaming Outputs: Streaming responses improve user experience
            but implementing output filtering can be challenging. An
            approach is to stream while performing on-the-fly detection,
            cancelling output if an issue is found.
      - id: AIR-PREV-003.2
        title: Remediation Techniques
        text: ""
        recommendations:
          - >
            Basic Filters: Simple static checks using blocklists and
            regular expressions can detect rudimentary attacks or policy
            violations.
          - >
            System Prompts (Caution Advised): While system prompts can
            instruct an LLM on what to avoid, they are generally not a
            robust security control. Attackers can often bypass these
            instructions.
          - >
            LLM as a Judge: A secondary, specialized LLM analyzes user
            queries and the primary LLM's responses, categorizing
            inputs/outputs for various risks such as prompt injection,
            abuse, hate speech, and data leakage.
          - >
            Human Feedback Loop: Implementing a system where users can
            easily report problematic AI responses provides a valuable
            complementary control.
      - id: AIR-PREV-003.3
        title: Additional Considerations
        text: ""
        recommendations:
          - >
            API Security and Observability: Implementing a comprehensive
            API monitoring and security solution offers benefits beyond
            AI-specific threats. A security proxy can enforce encrypted
            communication between all AI system components.
          - >
            Logging and Analysis: Detailed logging of interactions is
            essential for understanding user behavior, system performance,
            and detection of sophisticated attacks or anomalies.
      - id: AIR-PREV-003.4
        title: Challenges and Considerations
        text: >
          RAG Database Security: Vector databases make traditional security
          filtering difficult once data is embedded. Filtering Efficacy:
          Static filters may miss nuanced attacks or sophisticated content.
          Streaming Outputs: Real-time filtering creates trade-offs between
          security and user experience.
    principles:
      - reference-id: AIR-PRIN
        entries:
          - reference-id: AIR-PRIN-001
            remarks: RAG data filtered before transmission to external services
          - reference-id: AIR-PRIN-004
            remarks: Layered filtering at user input, model output, and RAG ingestion boundaries
          - reference-id: AIR-PRIN-005
            remarks: Logging and analysis of all interactions for audit and anomaly detection
