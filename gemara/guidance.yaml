  - id: AIR-DET-015
    group: DET
    title: Using Large Language Models for Automated Evaluation (LLM-as-a-Judge)
    objective: >
      "LLM-as-a-Judge" (also referred to as LLM-based evaluation) is an
      emerging detective technique where one Large Language Model (the "judge"
      or "evaluator LLM") is employed to automatically assess the quality,
      safety, accuracy, adherence to guidelines, or other specific
      characteristics of outputs generated by another (primary) AI system,
      typically also an LLM.: Detect undesirable outputs: Identify responses
      that may be inaccurate, irrelevant, biased, harmful, non-compliant with
      policies, or indicative of data leakage (ri-1); Monitor performance and
      quality: Continuously evaluate if the primary AI system is functioning
      as intended and maintaining output quality over time; Flag issues for
      human review: Highlight problematic outputs that require human attention
      and intervention, making human oversight more targeted and efficient.
      The primary purpose of this control is to automate or augment aspects of
      the AI system verification, validation, and ongoing monitoring
      processes. Given the volume and complexity of outputs from modern AI
      systems (especially Generative AI), manual review by humans can be
      expensive, time-consuming, and difficult to scale. LLM-as-a-Judge aims
      to provide a scalable way to: This approach is particularly relevant for
      assessing qualitative aspects of AI-generated content that are
      challenging to measure with traditional quantitative metrics.
    rationale:
      importance: >
        Conclusion: LLM-as-a-Judge is a promising detective tool to enhance AI
        system evaluation and monitoring. However, it must be implemented with
        a clear understanding of its capabilities and limitations, and always
        as a complement to, rather than a replacement for, rigorous human
        oversight and accountability.
      goals:
        - "Evaluation Scalability: Enables evaluation of much larger volumes of AI outputs than manual review"
        - "Cost and Time Efficiency: Reduces time and expense of human evaluation for routine assessments"
        - "Consistency: Once calibrated, can apply evaluation criteria more consistently than human evaluators"
        - "Early Issue Detection: Facilitates detection of performance degradation and emerging safety concerns"
        - "Continuous Improvement: Generates ongoing feedback for iterative refinement of AI systems"
        - "Human Oversight Augmentation: Acts as first-pass filter to make human review more focused and efficient"
        - "Benchmarking Support: Enables consistent comparison of different model versions and approaches"
    see-also:
      - AIR-DET-011
      - AIR-PREV-005
    statements:
      - id: AIR-DET-015.1
        title: Defining the Evaluation Task and Criteria
        text: ""
        recommendations:
          - >
            Specify Evaluation Goals: Clearly articulate what aspects of the
            primary AI's output need to be evaluated (e.g., is it about
            factual correctness in a RAG system, adherence to safety
            guidelines, stylistic consistency, absence of PII?).
          - >
            Develop Detailed Rubrics/Guidelines: Create precise instructions,
            rubrics, or "constitutions" for the "judge" LLM. For example, in a
            RAG use case, an evaluator LLM might be presented with a source
            document, a user's question, the primary RAG system's answer, and
            then asked to assess if the answer is factually consistent with
            the source document and to explain its reasoning.
          - >
            Define Output Format: Specify the desired output format from the
            "judge" LLM (e.g., a numerical score, a categorical label like
            "Compliant/Non-compliant," a binary "True/False," and/or a textual
            explanation).
      - id: AIR-DET-015.2
        title: Selecting or Configuring the "Judge" LLM
        text: ""
        recommendations:
          - >
            Choice of Model: Options include:
          - >
            Prompt Engineering for the "Judge": Develop robust and unambiguous
            prompts that clearly instruct the "judge" LLM on its task, the
            criteria to use, and the format of its output.
      - id: AIR-DET-015.3
        title: Designing and Executing the Evaluation Process
        text: ""
        recommendations:
          - >
            Input Preparation: Structure the input to the "judge" LLM, which
            typically includes:
          - >
            Batch vs. Real-time Evaluation: Decide whether evaluations will be
            done in batches (e.g., for testing sets or periodic sampling of
            production data) or in near real-time for ongoing monitoring
            (though this has higher cost and latency implications).
      - id: AIR-DET-015.4
        title: Evaluating and Calibrating the "Judge" LLM's Performance
        text: ""
        recommendations:
          - >
            Benchmarking Against Human Evaluation: The crucial step is to
            measure the "judge" LLM's performance against evaluations
            conducted by human Subject Matter Experts (SMEs) on a
            representative set of the primary AI's outputs.
          - >
            Metrics for Judge Performance:; Classification Metrics:;
            Correlation Metrics:
          - >
            Iterative Refinement: Based on this calibration, refine the
            "judge's" prompts, adjust its configuration, or even consider a
            different "judge" model to improve its alignment with human
            judgments.
      - id: AIR-DET-015.5
        title: Integrating "LLM-as-a-Judge" into AI System Lifecycles
        text: ""
        recommendations:
          - >
            Development and Testing: Use LLM-as-a-Judge to automate parts of
            model testing, compare different model versions or prompts, and
            identify regressions during development (supports ISO 42001
            A.6.2.4).
          - >
            Continuous Monitoring in Production: Apply LLM-as-a-Judge to a
            sample of live production outputs to monitor for degradation in
            quality, emerging safety issues, or deviations from expected
            behavior over time (supports ISO 42001 A.6.2.6).
          - >
            Feedback Loop for Primary Model Improvement: The evaluations from
            the "judge" LLM can provide scalable feedback signals to help
            identify areas where the primary AI model or its surrounding
            application logic needs improvement.
      - id: AIR-DET-015.6
        title: Ensuring Human Review and Escalation Pathways
        text: ""
        recommendations:
          - >
            Human-in-the-Loop: Establish clear processes for human review of
            the "judge" LLM's evaluations, especially for:
          - >
            Escalation Procedures: Define clear pathways for escalating
            critical issues identified by the "judge" (and confirmed by human
            review) to relevant teams (e.g., MLOps, security, legal,
            compliance).
