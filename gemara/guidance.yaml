        entries:
          - reference-id: AIR-PRIN-003
            remarks: Encryption limits exposure of AI data if storage is accessed
          - reference-id: AIR-PRIN-004
            remarks: Encryption at rest adds a protective layer beneath access controls
          - reference-id: AIR-PRIN-005
            remarks: Key management and verification activities are auditable
