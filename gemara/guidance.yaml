  - id: AIR-DET-004
    group: DET
    title: AI System Observability
    objective: >
      AI System Observability encompasses the comprehensive collection,
      analysis, and monitoring of data about AI system behavior, performance,
      interactions, and outcomes. This control is essential for maintaining
      operational awareness, detecting anomalies, ensuring performance
      standards, and supporting incident response for AI-driven applications
      and services within a financial institution. The goal is to provide deep
      visibility into all aspects of AI system operations—from user
      interactions and model behavior to resource utilization and security
      events—enabling proactive management, rapid issue resolution, and
      continuous improvement.
    rationale:
      importance: >
        Comprehensive AI system observability provides numerous critical
        benefits for a financial institution.
      goals:
        - "Early Anomaly and Threat Detection: Enables the proactive identification of unusual system behaviors, performance degradation, data drift, potential security breaches (e.g., unauthorized access, prompt injection attempts), or misuse that other specific controls might not explicitly cover."
        - "Enhanced Security Incident Response: Provides vital data for thoroughly investigating security incidents, understanding attack vectors, assessing the scope and impact, performing root cause analysis, and informing remediation efforts."
        - "Support for Audit, Compliance, and Regulatory Reporting: Generates essential, auditable records to demonstrate operational integrity, adherence to internal policies, and compliance with external regulatory requirements (e.g., event logging for accountability)."
        - "Effective Performance Management and Optimization: Allows for continuous tracking of AI model performance (e.g., accuracy, latency, throughput) and resource utilization, facilitating the identification of bottlenecks and opportunities for optimization."
        - "Proactive Management of Model and System Drift: Helps detect and diagnose changes in model behavior or overall system performance that may occur due to updates in models, system architecture, or shifts in underlying data distributions."
        - "Improved SLA Adherence and Cost Control (FinOps): Provides the necessary data to monitor Service Level Agreement (SLA) compliance for AI services. Monitoring API call volumes, resource consumption (CPU, GPU), and frontend activity is crucial for managing operational costs and preventing \"Denial of Wallet\" attacks (ri-7). Alerts can be configured for when usage approaches predefined limits."
        - "Detection and Understanding of System Misuse: Capturing inputs, including user prompts (while respecting privacy), can help identify patterns of external misuse, such as individuals or coordinated campaigns attempting to exploit the system or bypass established guardrails, even if individual attempts are initially blocked."
        - "Identification of Data Integrity and Leakage Issues: Aids in detecting potential data integrity problems, such as \"data bleeding\" (unintended information leakage between different user sessions) or unintended data persistence across sessions (\"data pollution\")."
        - "Crucial Support for Responsible AI Implementation: Logging and monitoring AI system behavior against specific metrics (e.g., related to fairness, bias, transparency, explainability) is necessary to provide ongoing assurance that responsible AI principles are being effectively implemented and maintained in practice."
        - "Informed Troubleshooting and Debugging: Offers deep insights into system operations and interactions, facilitating faster diagnosis and resolution of both technical and model-related issues."
        - "Increased Trust and Transparency: Demonstrates robust control, understanding, and transparent operation of AI systems, fostering trust among users, stakeholders, and regulatory bodies."
    see-also:
      - AIR-DET-009
      - AIR-DET-011
    statements:
      - id: AIR-DET-004.1
        title: Establish an Observability Strategy
        text: ""
        recommendations:
          - >
            Define Objectives: Clearly articulate the goals for AI system
            observability based on business requirements, specific AI risks
            (e.g., fairness, security, operational resilience), compliance
            obligations, and operational support needs.
          - >
            Identify Stakeholders: Determine who needs access to observability
            data and insights (e.g., MLOps teams, data scientists, security
            analysts, risk managers, compliance officers) and their specific
            information requirements.
      - id: AIR-DET-004.2
        title: Identify Key Data Points for Logging and Monitoring
        text: ""
        recommendations:
          - >
            User Interactions and Inputs:
          - >
            AI Model Behavior and Outputs:
          - >
            API Traffic and System Interactions:
          - >
            Model Performance Metrics (as per ISO 42001 A.6.2.6):
          - >
            Resource Utilization and System Health:
          - >
            Security-Specific Events:
          - >
            Versioning Information:
      - id: AIR-DET-004.3
        title: Implement Appropriate Tooling and Architecture
        text: ""
        recommendations:
          - >
            Logging Frameworks & Libraries: Utilize robust logging libraries
            within AI applications and infrastructure components to generate
            structured and informative log data.
          - >
            Centralized Log Management: Aggregate logs from all components
            into a centralized system (e.g., SIEM, specialized log management
            platforms) to facilitate efficient searching, analysis,
            correlation, and long-term retention.
          - >
            Monitoring and Visualization Platforms: Employ dashboards and
            visualization tools to display key metrics, operational trends,
            system health, and security events in real-time or near real-time.
          - >
            Alerting Mechanisms: Configure automated alerts based on
            predefined thresholds, significant deviations from baselines,
            critical errors, or specific security event signatures (linking to
            concepts such as MI-9 Alerting / DoW spend alert).
          - >
            Distributed Tracing: For complex AI systems composed of multiple
            interacting microservices, implement distributed tracing
            capabilities to map end-to-end request flows, identify performance
            bottlenecks, and understand component dependencies.
          - >
            Horizontal Monitoring Solutions: Consider solutions that enable
            monitoring and correlation of activities across various inputs,
            outputs, and components simultaneously to achieve a holistic
            architectural view.
      - id: AIR-DET-004.4
        title: Establish Baselines and Implement Anomaly Detection
        text: ""
        recommendations:
          - >
            Baseline Definition: Collect observability data over a sufficient
            period under normal operating conditions to establish baselines
            for key performance, behavioral, and resource utilization metrics.
          - >
            Anomaly Detection Techniques: Implement methods (ranging from
            statistical approaches to machine learning-based techniques) to
            automatically detect significant deviations from these established
            baselines. Anomalies can indicate performance issues, emerging
            security threats, data drift, or unexpected model behavior.
      - id: AIR-DET-004.5
        title: Define Data Retention and Archival Policies
        text: ""
        recommendations:
          - >
            Formulate and implement clear policies for the retention and
            secure archival of observability data, balancing operational needs
            (e.g., troubleshooting, trend analysis), regulatory requirements
            (e.g., audit trails), and storage cost considerations.
      - id: AIR-DET-004.6
        title: Ensure Regular Review and Iteration
        text: ""
        recommendations:
          - >
            Periodically review the effectiveness of the observability
            strategy, the relevance of data points being collected, the
            accuracy of alerting thresholds, and the utility of dashboards.
            Adapt and refine the observability setup as the AI system evolves,
            new risks are identified, or business and compliance requirements
            change.
    principles:
