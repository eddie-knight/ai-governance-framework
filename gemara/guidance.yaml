  - id: AIR-DET-016
    group: DET
    title: Preserving Source Data Access Controls in AI Systems
    objective: >
      This control addresses the critical requirement that when an Artificial
      Intelligence (AI) system—particularly one employing Retrieval Augmented
      Generation (RAG) or similar techniques—ingests data from various
      internal or external sources, the original access control permissions,
      restrictions, and entitlements associated with that source data must be
      understood, preserved, and effectively enforced when the AI system
      subsequently uses or presents information derived from that data. While
      the implementation of mechanisms to preserve these controls is
      preventative, this control also has a significant detective aspect. This
      involves the ongoing verification, auditing, and monitoring to ensure
      that these access controls are correctly mapped, consistently maintained
      within the AI ecosystem, and are not being inadvertently or maliciously
      bypassed. Detecting deviations or failures in preserving source access
      controls is paramount to preventing unauthorized data exposure through
      the AI system.
    rationale:
      importance: >
        Despite the challenges, striving to preserve source data access
        controls within AI systems is crucial.
      goals:
        - "Unauthorized Access Prevention: Prevents AI systems from becoming unintentional backdoors for accessing restricted data"
        - "Data Confidentiality Maintenance: Upholds intended security posture and confidentiality requirements of source data"
        - "Regulatory Compliance: Essential for adhering to data protection regulations and internal governance policies"
        - "Insider Risk Reduction: Limits accessible data scope to only what user roles permit"
        - "Trust Building: Assures stakeholders that AI systems respect and enforce established data access policies"
        - "Audit and Detection Support: Enables identification and investigation of misconfigurations and policy violations"
        - "Responsible AI Deployment: Ensures AI systems operate within established data governance frameworks"
    see-also:
      - AIR-PREV-012
      - AIR-PREV-002
    statements:
      - id: AIR-DET-016.1
        title: Understanding and Documenting Source Access Controls
        text: ""
        recommendations:
          - >
            Discovery and Analysis: Before or during data ingestion,
            thoroughly identify, analyze, and document the existing access
            control lists (ACLs), roles, permissions, and any other
            entitlement mechanisms associated with all source data
            repositories (e.g., file shares, databases, document management
            systems like Confluence).
          - >
            Mapping Entitlements: Understand how these source permissions
            translate to user identities or groups within the organization's
            identity management system.
      - id: AIR-DET-016.2
        title: Strategies for Preserving and Enforcing Access Controls in AI Systems
        text: ""
        recommendations:
          - >
            A. Leveraging Native Access Controls in AI Data Stores (e.g.,
            Vector Databases):; Assessment:; Configuration:
          - >
            B. Data Segregation and Siloing Based on Access Domains:;
            Strategy:; Access Provisioning:; Consolidation of Granular
            Permissions:
          - >
            C. Application-Layer Access Control Enforcement:; Mechanism: 1.
            Authenticate the user and retrieve their identity and associated
            entitlements from the corporate Identity Provider (IdP). 2.
            Intercept the user's query to the AI. 3. Before passing the query
            to the RAG system or LLM, modify it or constrain its scope to
            ensure that any data retrieval or processing only targets data
            segments the user is authorized to access (based on their
            entitlements and the preserved source permissions metadata). 4.
            Filter the AI's response to redact or remove any information
            derived from data sources the user is not permitted to see.;
            Complexity:
          - >
            D. Metadata-Driven Access Control at Query Time:; Ingestion
            Enrichment:; Query-Time Filtering:
      - id: AIR-DET-016.3
        title: Avoiding Insecure "Shortcuts"
        text: ""
        recommendations:
          - >
            System Prompt-Based Access Control (Strongly Discouraged):
            Attempting to enforce access controls by merely instructing an LLM
            via its system prompt (e.g., "Only show data from 'Department X'
            to users in 'Group Y'") is highly unreliable, inefficient, and
            proven to be easily bypassable through adversarial prompting. This
            method should not be considered a secure mechanism for preserving
            access controls and must be avoided.
      - id: AIR-DET-016.4
        title: Verification, Auditing, and Monitoring (The Detective Aspect)
        text: ""
        recommendations:
          - >
            Regular Configuration Audits: Periodically audit the configuration
            of access controls in source systems and, critically, how these
            are mapped and implemented within the AI data stores, RAG
            pipelines, and any application-layer enforcement points.
          - >
            Penetration Testing and Red Teaming: Conduct targeted security
            testing, including penetration tests and red teaming exercises,
            specifically designed to attempt to bypass the preserved access
            controls and access unauthorized data through the AI system.
          - >
            Access Log Monitoring: Implement comprehensive logging of user
            queries, data retrieval actions within the RAG system, and the
            final responses generated by the AI. Monitor these logs for:
          - >
            Entitlement Reconciliation Reviews: Periodically reconcile the
            list of users and their permissions for accessing the AI system
            (or specific RAG interfaces) against the access controls defined
            on the data ingested into those systems. The goal is to ensure
            there are no exfiltration paths where users might gain access to
            information they shouldn't, due to misconfiguration or aggregation
            effects.
          - >
            Data Lineage and Provenance Tracking: To the extent possible,
            maintain lineage information that tracks which source documents
            (and their original permissions) contributed to specific
            AI-generated outputs. This aids in investigations if a potential
            access control violation is suspected.
    principles:
      - reference-id: AIR-PRIN
        entries:
          - reference-id: AIR-PRIN-002
            remarks: Source sensitivity and permissions are preserved into AI retrieval
          - reference-id: AIR-PRIN-003
            remarks: Users only retrieve data they are authorized to see
          - reference-id: AIR-PRIN-005
            remarks: Access verification and monitoring provide auditability
