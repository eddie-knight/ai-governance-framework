  - id: AIR-PREV-014
    group: PREV
    title: Encryption of AI Data at Rest
    objective: >
      Encryption of data at rest is a fundamental security control that
      involves transforming stored information into a cryptographically
      secured format using robust encryption algorithms. This process renders
      the data unintelligible and inaccessible to unauthorized parties unless
      they possess the corresponding decryption key. The primary objective is
      to protect the confidentiality and integrity of sensitive data
      associated with AI systems, even if the underlying storage medium (e.g.,
      disks, servers, backup tapes) is physically or logically compromised.
      While considered a standard security practice across IT, its diligent
      application to all components of AI systems, including newer
      technologies like vector databases, is critical.
    rationale:
      importance: >
        Implementing strong encryption for AI data at rest provides crucial
        benefits to financial institutions.
      goals:
        - "Data Confidentiality: Protects sensitive corporate, customer, and AI model data from unauthorized disclosure"
        - "Breach Impact Reduction: Encrypted data remains unintelligible to attackers without decryption keys"
        - "Regulatory Compliance: Meets stringent data protection requirements mandated by various regulations"
        - "Intellectual Property Protection: Safeguards valuable AI models and proprietary datasets from theft"
        - "Trust and Confidence: Demonstrates strong commitment to data security for stakeholders"
        - "Security Best Practices: Aligns with widely recognized information security standards"
    see-also:
      - AIR-PREV-006
      - AIR-PREV-012
    statements:
      - id: AIR-PREV-014.1
        title: Define Policies and Standards
        text: ""
        recommendations:
          - >
            Establish clear organizational policies and standards for data
            encryption at rest. These should specify approved encryption
            algorithms (e.g., AES-256), key lengths, modes of operation, and
            mandatory key management procedures. (Aligns with ISO 42001 A.7.2
            regarding data management processes).
      - id: AIR-PREV-014.2
        title: Select Appropriate Encryption Mechanisms
        text: ""
        recommendations:
          - >
            Storage-Level Encryption:; Full-Disk Encryption (FDE):; File
            System-Level Encryption:; Database Encryption:
          - >
            Application-Level Encryption: Data is encrypted by the application
            before being written to any storage medium. This provides granular
            control but requires careful implementation within the AI
            applications or data pipelines.
      - id: AIR-PREV-014.3
        title: Implement Robust Key Management
        text: ""
        recommendations:
          - >
            Utilize a dedicated, hardened Key Management System (KMS) for the
            secure lifecycle management of encryption keys (generation,
            storage, distribution, rotation, backup, and revocation).
          - >
            Enforce strict access controls to encryption keys based on the
            principle of least privilege and separation of duties.
          - >
            Regularly rotate encryption keys according to policy and best
            practices.
      - id: AIR-PREV-014.4
        title: Specific Considerations for AI Components and New Technologies
        text: ""
        recommendations:
          - >
            Vector Databases:; Criticality:; Cloud-Native Vector Stores:;
            Managed SaaS Vector Databases:; Self-Hosted Vector Databases:
          - >
            In-Memory Data Processing (e.g., FAISS):
      - id: AIR-PREV-014.5
        title: Regular Verification and Audit
        text: ""
        recommendations:
          - >
            Periodically verify that encryption controls are correctly
            implemented, active, and effective across all relevant AI data
            storage systems.
          - >
            Include encryption at rest configurations and key management
            practices as part of regular information security audits and
            assessments.
    principles:
