  - id: AIR-PREV-010
    group: PREV
    title: AI Model Version Pinning
    objective: >
      Model Version Pinning is the deliberate practice of selecting and using
      a specific, fixed version of an Artificial Intelligence (AI) model
      within a production environment, rather than automatically adopting the
      latest available version. This is particularly crucial when utilizing
      externally sourced models, such as foundation models provided by
      third-party vendors. The primary goal of model version pinning is to
      ensure operational stability, maintain predictable AI system behavior,
      and enable a controlled, risk-managed approach to adopting model
      updates. This practice helps prevent unexpected disruptions, performance
      degradation, or the introduction of new vulnerabilities that might arise
      from unvetted changes in newer model versions.
    rationale:
      importance: >
        Adopting AI model version pinning offers significant advantages for
        financial institutions.
      goals:
        - "Operational Stability: Prevents unexpected disruptions and ensures consistent AI system behavior"
        - "Predictable Performance: Guarantees AI systems perform as expected based on tested model versions"
        - "Risk Management: Enables thorough assessment of risks before deploying new model versions"
        - "Change Control: Facilitates systematic, auditable change management for AI model updates"
        - "Compliance Support: Provides documentation and traceability for regulatory requirements"
        - "Incident Response: Simplifies troubleshooting by providing stable, known baselines for AI behavior"
    see-also:
      - AIR-PREV-005
    statements:
      - id: AIR-PREV-010.1
        title: Establishing Expectations with AI Model Suppliers
        text: ""
        recommendations:
          - >
            Clear Versioning Scheme and Detailed Release Notes:; Requirement:;
            Details:
          - >
            Advance Notification of New Versions and Deprecation:;
            Requirement:
          - >
            API Flexibility for Version Selection and Backward Compatibility:;
            Requirement:; Support:
          - >
            Support for Testing New Versions:; Requirement:
          - >
            Transparency into Supplier's Testing Practices:; Due Diligence:
          - >
            Feedback Mechanisms:; Requirement:
      - id: AIR-PREV-010.2
        title: Internal Organizational Practices for Model Version Management
        text: ""
        recommendations:
          - >
            Explicit Version Selection and Pinning:; Action:
          - >
            Develop a Version Upgrade Strategy and Process:; Action:; Testing
            Scope:
          - >
            Implement Controlled Deployment and Rollback Procedures:; Action:;
            Rollback Plan:
          - >
            Continuous Monitoring of Pinned Models:; Action:
          - >
            Maintain an Inventory and Conduct Regular Audits:; Action:;
            Audits:
          - >
            Ensure Traceability and Comprehensive Logging:; Action:; Metadata:
          - >
            Thorough Documentation:; Action:
    principles:
      - reference-id: AIR-PRIN
        entries:
          - reference-id: AIR-PRIN-004
            remarks: Controlled version management prevents unvalidated model changes reaching production
          - reference-id: AIR-PRIN-005
            remarks: Version pinning and change records make model behaviour traceable and auditable
    vectors:
