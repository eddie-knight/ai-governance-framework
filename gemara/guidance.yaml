  - id: AIR-DET-001
    group: DET
    title: AI Data Leakage Prevention and Detection
    objective: >
      Data Leakage Prevention and Detection (DLP&D) for Artificial
      Intelligence (AI) systems encompasses a combination of proactive
      measures to prevent sensitive data from unauthorized egress or exposure
      through these systems, and detective measures to identify such incidents
      promptly if they occur. This control is critical for safeguarding
      various types of information associated with AI, including: Session
      Data: Information exchanged during interactions with AI models (e.g.,
      user prompts, model responses, intermediate data); Training Data:
      Proprietary or sensitive datasets used to train or fine-tune AI models;
      Model Intellectual Property: The AI models themselves (weights,
      architecture) which represent significant intellectual property. This
      control applies to both internally developed AI systems and, crucially,
      to scenarios involving Third-Party Service Providers (TSPs) for
      LLM-powered services or raw model endpoints, where data may cross
      organizational boundaries.
    rationale:
      importance: >
        Implementing comprehensive Data Leakage Prevention and Detection
        controls for AI systems is vital for financial institutions.
      goals:
        - "Protection of Highly Sensitive Information: Safeguards customer Personally Identifiable Information (PII), confidential corporate data, financial records, and strategic information that may be processed by or embedded within AI systems."
        - "Preservation of Valuable Intellectual Property: Protects proprietary AI models, unique training datasets, and related innovations from theft, unauthorized use, or competitive disadvantage."
        - "Adherence to Regulatory Compliance: Helps meet stringent obligations under various data protection laws (e.g., GDPR, CCPA, GLBA) and industry-specific regulations which mandate the security of sensitive data and often carry severe penalties for breaches."
        - "Maintaining Customer and Stakeholder Trust: Prevents data breaches and unauthorized disclosures that can severely damage customer trust, institutional reputation, and investor confidence."
        - "Mitigating Financial and Operational Loss: Avoids direct financial costs associated with data leakage incidents (e.g., fines, legal fees, incident response costs) and indirect costs from business disruption or loss of competitive edge."
        - "Enabling Safe Innovation with Third-Party AI: Provides crucial mechanisms to reduce and monitor risks when leveraging external AI services and foundational models, allowing the institution to innovate confidently while managing data exposure."
        - "Early Warning System: Detective controls act as an early warning system, enabling rapid response to contain leaks and minimize their impact before they escalate."
    see-also:
      - AIR-PREV-002
      - AIR-DET-004
    statements:
      - id: AIR-DET-001.1
        title: "Proactive Measures: Preventing Data Leakage"
        text: ""
        recommendations:
          - >
            Secure Communication Channels: Mandate and verify the use of
            strong, industry-best-practice encryption protocols (e.g., TLS
            1.3+) for all data in transit.
          - >
            Secure Network Architectures: Where feasible, prefer architectural
            patterns like private endpoints or dedicated clusters within the
            institution's secure cloud tenant to minimize data transmission
            over the public internet.
          - >
            Control over Data Persistence: Contractually require and
            technically verify that TSPs default to "zero persistence" or
            minimal, time-bound persistence of logs and session data.
          - >
            Secure Data Disposal: Ensure vendor contracts include commitments
            to secure and certified disposal of storage media.
          - >
            Scrutiny of Multi-Tenant Architectures: Thoroughly review the
            TSP's architecture, security certifications (e.g., SOC 2 Type II),
            and penetration test results to assess the adequacy of logical
            tenant isolation.
          - >
            Prohibition on Unauthorized Data Use: Legal agreements must
            explicitly prohibit AI providers from using proprietary data for
            training their general-purpose models without explicit consent.
          - >
            Transparency in Performance Optimizations: Require TSPs to provide
            clear information about caching or other performance optimizations
            that might create new data leakage vectors.
          - >
            Robust Access Controls and Secure Storage: Implement strict access
            controls (e.g., Role-Based Access Control), strong encryption at
            rest, and secure, isolated storage environments for all
            proprietary datasets.
          - >
            Guardrails Against Extraction via Prompts: Implement and
            continuously evaluate input/output filtering mechanisms
            ("guardrails") to detect and block attempts by users to extract
            training data through crafted prompts.
          - >
            Secure Model Storage and Access Control: Treat trained model
            weights and configurations as highly sensitive intellectual
            property, storing them in secure, access-controlled repositories
            with strong encryption.
          - >
            Prevent Unauthorized Distribution: Implement technical and
            contractual controls to prevent unauthorized copying or transfer
            of model artifacts.
      - id: AIR-DET-001.2
        title: "Detective Measures: Identifying Data Leakage"
        text: ""
        recommendations:
          - >
            Canary Tokens ("Honey Tokens"): Embed uniquely identifiable,
            non-sensitive markers ("canaries") within data streams sent to AI
            models. Continuously monitor public and dark web sources for the
            appearance of these canaries.
          - >
            Data Fingerprinting: Generate unique cryptographic hashes
            ("fingerprints") of sensitive data before it is processed by an AI
            system. Monitor for the appearance of these fingerprints in
            unauthorized locations.
          - >
            Integration into AI Interaction Points: Integrate canary token
            generation and fingerprinting at key data touchpoints like API
            gateways or data ingestion pipelines.
          - >
            Automated Detection and Incident Response: Develop automated
            systems to scan for exposed canaries or fingerprints. Upon
            detection, trigger an immediate alert to the security operations
            team to initiate a predefined incident response plan.
          - >
            Monitoring Guardrail Effectiveness: Continuously monitor the
            performance and logs of input/output guardrails. Investigate
            suspicious prompt patterns that might indicate attempts to
            circumvent these protections.
          - >
            Emerging Techniques: Stay informed about and evaluate emerging
            research for "fingerprinting" or watermarking AI models (e.g.,
            "Instructional Fingerprinting") to detect unauthorized copies of
            proprietary models.
    principles:
      - reference-id: AIR-PRIN
        entries:
          - reference-id: AIR-PRIN-001
            remarks: Input/output guardrails sanitize data before it leaves the AI trust boundary
          - reference-id: AIR-PRIN-003
            remarks: Minimizes sensitive data exposed to third-party model services
          - reference-id: AIR-PRIN-004
            remarks: Layered preventive and detective controls across transmission, storage, and model layers
          - reference-id: AIR-PRIN-005
            remarks: Canary tokens, fingerprinting, and monitoring provide audit evidence of leakage
