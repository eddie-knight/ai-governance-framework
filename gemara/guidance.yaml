  - id: AIR-PREV-006
    group: PREV
    title: Data Quality & Classification/Sensitivity
    objective: >
      The integrity, security, and effectiveness of any AI system deployed
      within a financial institution are fundamentally dependent on the
      quality and appropriate handling of the data it uses. This control
      establishes the necessity for robust processes to: Ensure Data Quality:
      Verify that data used for training, testing, and operating AI systems is
      accurate, complete, relevant, timely, and fit for its intended purpose;
      Implement Data Classification: Systematically categorize data based on
      its sensitivity (e.g., public, internal, confidential, restricted) to
      dictate appropriate security measures, access controls, and handling
      procedures throughout the AI lifecycle. Adherence to these practices is
      critical for building trustworthy AI, minimizing risks, and meeting
      regulatory obligations.
    rationale:
      importance: >
        Implementing robust data quality assurance and sensitivity
        classification for AI systems yields significant benefits.
      goals:
        - "Data Protection: Accurate classification protects sensitive information and mitigates unauthorized access risks"
        - "Model Performance: High-quality data ensures accurate, robust, and dependable AI model outputs"
        - "Bias Mitigation: Rigorous data quality practices support ethical, fair, and unbiased AI outcomes"
        - "Regulatory Compliance: Provides framework for meeting data protection regulations and audit requirements"
        - "Stakeholder Trust: Demonstrates strong governance practices that build confidence in AI systems"
        - "Operational Efficiency: Prevents wasted resources from data-related issues and rework"
    see-also:
      - AIR-PREV-002
      - AIR-PREV-012
    statements:
      - id: AIR-PREV-006.1
        title: Implementation Guidance
        text: ""
        recommendations:
          - >
            Data Source Vetting: Before incorporating any new data source,
            assess its origin, reliability, existing quality controls, and the
            accuracy of any pre-existing classifications, prioritising
            well-governed, trusted internal sources.
          - >
            Automated Tools: Leverage automated tools for data discovery,
            profiling, and classification (pattern matching, metadata
            analysis, or ML-based classifiers) to manage data at scale, and
            implement automated quality checks and validation rules within
            data pipelines.
          - >
            Manual Oversight and QA: Supplement automation with targeted
            manual review for highly sensitive data, data used in critical AI
            applications, and validation of automated classification and
            quality results.
          - >
            Filtering and Control Based on Classification/Quality: Implement
            technical controls to filter, segregate, or restrict data from AI
            ingestion pipelines based on sensitivity and quality metrics, and
            ensure quality issues below a threshold trigger alerts or block
            use until remediated.
          - >
            Data Pre-processing for Quality Enhancement: Address quality
            issues through handling missing values, correcting inaccuracies,
            standardising formats, normalising, and removing duplicates,
            documenting all transformations to maintain lineage.
          - >
            Regular Audits and Continuous Monitoring: Periodically audit
            classification accuracy and quality-management effectiveness, and
            continuously monitor pipelines for data-distribution drift or
            quality degradation that can impact model performance, fairness,
            and reliability.
          - >
            Training and Awareness Programs: Provide regular training to
            personnel involved in data management and AI operations on
            classification policies, quality standards, ethical data use, and
            secure data handling.
    principles:
      - reference-id: AIR-PRIN
        entries:
          - reference-id: AIR-PRIN-001
            remarks: Data cleansing and pre-processing applied before AI ingestion
          - reference-id: AIR-PRIN-002
            remarks: Source data classified by sensitivity to drive handling decisions
          - reference-id: AIR-PRIN-003
            remarks: Classification restricts unnecessary or unfit data from AI pipelines
          - reference-id: AIR-PRIN-005
            remarks: Data lineage, metadata, and audits document quality and classification
