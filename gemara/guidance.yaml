        title: Types of Feedback and Collection Methods
        text: ""
        recommendations:
          - >
            Quantitative Feedback:; Description:; Use Cases:
          - >
            Qualitative Feedback:; Description:; Use Cases:
          - >
            Implicit Feedback:; Description:; Use Cases:
          - >
            Channels for Collection:
      - id: AIR-DET-011.3
        title: Processing and Utilizing Feedback
        text: ""
        recommendations:
          - >
            Systematic Analysis: Implement processes for regularly collecting,
            aggregating, and analyzing both quantitative and qualitative
            feedback.
          - >
            Specific Use Cases for Feedback Data:; Prompt Engineering and
            Fine-tuning:; RAG System Improvement:; Model and Data Drift
            Detection:; Identifying Security Vulnerabilities:; Highlighting
            Ethical Concerns and Bias:; Improving User Documentation and
            Training:
      - id: AIR-DET-011.4
        title: "Advanced Feedback Integration: Reinforcement Learning from Human Feedback (RLHF)"
        text: ""
        recommendations:
          - >
            Conceptual Overview for Risk Audience: RLHF is an advanced machine
            learning technique where AI models, particularly LLMs, are further
            refined using direct human judgments on their outputs. Instead of
            solely relying on pre-existing data, human evaluators assess model
            responses (e.g., rating helpfulness, correctness, safety,
            adherence to instructions). This feedback is then used to
            systematically adjust the model's internal decision-making
            processes, effectively "rewarding" desired behaviors and
            "penalizing" undesired ones.
          - >
            Key Objective: The primary goal of RLHF is to better align the AI
            model's behavior with human goals, nuanced preferences, ethical
            considerations, and complex instructions that are hard to specify
            in traditional training datasets.
          - >
            Process Simplification: 1. Feedback Collection: Systematically
            gather human evaluations on model outputs for a diverse set of
            inputs. 2. Reward Modeling: This feedback is often used to train a
            separate "reward model" that learns to predict human preferences.
            3. Policy Optimization: The primary AI model is then fine-tuned
            using reinforcement learning techniques, with the reward model
            providing signals to guide its learning towards generating more
            highly-rated outputs.
          - >
            Benefits for Control: RLHF can significantly improve model safety,
            reduce the generation of harmful or biased content, and enhance
            the model's ability to follow instructions faithfully.
      - id: AIR-DET-011.5
        title: Integration with "LLM-as-a-Judge" Concepts
        text: ""
        recommendations:
          - >
            Context: As organizations explore using LLMs to evaluate the
            outputs of other LLMs ("LLM-as-a-Judge" - see CT-15), human
            feedback loops remain essential.
          - >
            Application: Implement mechanisms for humans (especially SMEs) to
            provide quantitative and qualitative feedback on the judgments
            made by these LLM judges.
          - >
            Benefits: This allows for:
      - id: AIR-DET-011.6
        title: Feedback Review, Actioning, and Governance Process
        text: ""
        recommendations:
          - >
            Defined Responsibilities: Assign clear roles and responsibilities
            for collecting, reviewing, triaging, and actioning feedback (e.g.,
            product owners, MLOps teams, data science teams, AI governance
            committees).
          - >
            Triage and Prioritization: Establish a process to categorize and
            prioritize incoming feedback based on severity, frequency,
            potential impact, and alignment with strategic goals.
          - >
            Feedback Participation Monitoring: Track submission rates and
            feedback quality over time as early indicators of feedback loop
            degradation. A sustained decline is often caused by feedback
            fatigue, when the effort required outweighs the perceived impact,
            and can make feedback statistically unrepresentative, weakening
            triage and governance decisions. If participation drops,
            corrective actions should be taken, such as simplifying feedback
            channels, rotating SME reviewers, or clearly communicating the
            impact of prior submissions.
          - >
            Tracking and Resolution: Implement a system to track feedback
            items, the actions taken in response, and their outcomes.
          - >
            Closing the Loop: Where appropriate and feasible, inform users or
            feedback providers about how their input has been used or what
            changes have been made, fostering a sense of engagement. (Supports
            ISO 42001 A.6.2.6 for repairs/updates based on feedback).
    principles:
