  - id: AIR-DET-013
    group: DET
    title: Providing Citations and Source Traceability for AI-Generated Information
    objective: >
      This control outlines the practice of designing Artificial Intelligence
      (AI) systems—particularly Large Language Models (LLMs) and Retrieval
      Augmented Generation (RAG) systems that produce informational content to
      provide verifiable citations, references, or traceable links back to the
      original source data or knowledge used to formulate their outputs. The
      primary purpose of providing citations is to enhance the transparency,
      verifiability, and trustworthiness of AI-generated information. By
      enabling users, reviewers, and auditors to trace claims to their
      origins, this control acts as a crucial detective mechanism. It allows
      for the independent assessment of the AI's informational basis, thereby
      helping to detect and mitigate risks associated with misinformation, AI
      "hallucinations," lack of accountability, and reliance on inappropriate
      or outdated sources.
    rationale:
      importance: >
        Despite the challenges, providing citations and source traceability
        for AI-generated information offers significant benefits to financial
        institutions.
      goals:
        - "Trust and Transparency: Allows users to verify the basis for AI-generated information, reducing \"black box\" perceptions"
        - "Verifiability and Accountability: Enables independent verification of AI claims through source checking"
        - "Misinformation Detection: Provides paths to trace information back to sources and identify hallucinations"
        - "Critical Evaluation: Empowers users to assess the quality and relevance of underlying sources"
        - "System Improvement: User feedback on citation accuracy helps debug and refine AI systems"
        - "Compliance Support: Provides traceable sources for regulatory requirements and audit processes"
        - "Knowledge Discovery: Citations guide users to relevant documents for deeper understanding"
    see-also:
      - AIR-DET-004
      - AIR-PREV-006
    statements:
      - id: AIR-DET-013.1
        title: Designing AI Systems for Citability (Especially RAG Systems)
        text: ""
        recommendations:
          - >
            Source Tracking in RAG Pipelines: For RAG systems, it is essential
            that the pipeline maintains a robust and auditable link between
            the specific "chunks" of text retrieved from knowledge bases and
            the segments of the generated output that are based on those
            chunks. This linkage is fundamental for accurate citation.
          - >
            Optimal Content Chunking Strategies: Develop and implement
            appropriate strategies for breaking down source documents into
            smaller, uniquely identifiable, and addressable "chunks" that can
            be precisely referenced in citations.
          - >
            Preservation and Use of Metadata: Ensure that relevant metadata
            from source documents (e.g., document titles, authors, original
            URLs, document IDs, page numbers, section headers, last updated
            dates) is ingested, preserved, and made available for constructing
            meaningful citations.
          - >
            Internal Knowledge Base Integration: When using internal data
            sources (e.g., company wikis, document management systems,
            databases), ensure these systems have stable, persistent
            identifiers for content that can be reliably used in citations.
      - id: AIR-DET-013.2
        title: Presentation of Citations to Users
        text: ""
        recommendations:
          - >
            Clear Visual Indicators: Implement clear and intuitive visual cues
            within the user interface to indicate that a piece of information
            is cited (e.g., footnotes, endnotes, inline numerical references,
            highlighted text with hover-over citation details, clickable icons
            or links).
          - >
            Accessible Source Information: Provide users with easy mechanisms
            to access the full source information corresponding to a citation.
            This might involve direct links to source documents (if hosted and
            accessible), display of relevant text snippets from the source
            within the UI, or clear references to find the source material
            offline.
          - >
            Contextual Snippets (Optional but Recommended): Consider
            displaying a brief, relevant snippet of the cited source text
            directly alongside the citation. This can give users immediate
            context for the AI's claim without requiring them to open and
            search the full source document.
      - id: AIR-DET-013.3
        title: Quality, Relevance, and Limitations of Citations
        text: ""
        recommendations:
          - >
            Source Vetting (Upstream Process): While the AI system provides
            the citation, the quality and authoritativeness of the underlying
            knowledge base are critical. Curation processes for RAG sources
            should aim to include reliable and appropriate materials.
          - >
            Handling Uncitable or Abstractive Content: If the AI generates
            content based on its general parametric knowledge (i.e., knowledge
            learned during its foundational training, not from a specific
            retrieved document) or if it highly synthesizes information from
            multiple sources in an abstractive manner, the system should
            clearly indicate when a direct document-level citation is not
            applicable. Avoid generating misleading or fabricated citations.
          - >
            Assessing Citation Relevance: Where technically feasible,
            implement mechanisms (potentially AI-assisted) to evaluate the
            semantic relevance of the specific cited source segment to the
            precise claim being made in the generated output. Flag or provide
            confidence scores for citations where relevance might be lower.
      - id: AIR-DET-013.4
        title: Maintaining Citation Integrity Over Time
        text: ""
        recommendations:
          - >
            Managing "Link Rot": For citations that are URLs to external web
            pages or internal documents, implement strategies to monitor for
            and manage "link rot" (links becoming broken or leading to changed
            content). This might involve periodic link checking, caching key
            cited public web content, or prioritizing the use of persistent
            identifiers like Digital Object Identifiers (DOIs) where
            available.
          - >
            Versioning of Source Documents: Establish a clear strategy for how
            citations will behave if the underlying source documents are
            updated, versioned, or archived. Ideally, citations should point
            to the specific version of the source material used at the time
            the AI generated the information, or at least clearly indicate if
            a source has been updated since citation.
      - id: AIR-DET-013.5
        title: User Education and Guidance (as per ISO 42001 A.8.2)
        text: ""
        recommendations:
          - >
            Provide users with clear, accessible information and guidance on:
      - id: AIR-DET-013.6
        title: Technical Documentation (as per ISO 42001 A.6.2.7)
        text: ""
        recommendations:
          - >
            For internal technical teams, auditors, or regulators, ensure that
            AI system documentation clearly describes:
