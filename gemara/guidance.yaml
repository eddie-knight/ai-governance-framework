  - id: AIR-PREV-008
    group: PREV
    title: Quality of Service (QoS) and DDoS Prevention for AI Systems
    objective: >
      The increasing integration of Artificial Intelligence (AI) into
      financial applications, particularly through Generative AI, Retrieval
      Augmented Generation (RAG), and Agentic workflows, introduces
      significant operational risks. These include potential disruptions in
      service availability, degradation of performance, and inequities in
      service delivery. This control addresses the critical need to ensure
      Quality of Service (QoS) and implement robust Distributed Denial of
      Service (DDoS) prevention measures for AI systems. AI systems,
      especially those exposed via APIs or public interfaces, are susceptible
      to various attacks that can impact QoS. These include volumetric attacks
      (overwhelming the system with traffic), prompt flooding (sending a high
      volume of complex queries), and inference spam (repeated,
      resource-intensive model calls). Such activities can exhaust
      computational resources, induce unacceptable latency, or deny legitimate
      users access to critical AI-driven services. This control aims to
      maintain system resilience, ensure fair access, and protect against
      malicious attempts to disrupt AI operations.
    rationale:
      importance: >
        Implementing robust QoS and DDoS prevention measures for AI systems
        provides several key benefits for financial institutions.
      goals:
        - "Service Availability: Protects critical AI-driven services from disruption, ensuring business continuity for legitimate users"
        - "Performance Maintenance: Prevents degradation of AI system performance, ensuring timely responses and positive user experience"
        - "Financial Protection: Mitigates costs from service downtime, resource abuse, and reputational damage"
        - "Reputation Safeguarding: Demonstrates reliability and security, preserving customer trust"
        - "Fair Access: Enables equitable distribution of AI resources, preventing monopolization during peak loads"
        - "Operational Stability: Contributes to overall stability and predictability of IT operations"
    see-also:
      - AIR-DET-009
      - AIR-PREV-017
    statements:
      - id: AIR-PREV-008.1
        title: QoS and DDoS Prevention Measures
        text: ""
        recommendations:
          - >
            Rate Limiting: Enforce per-user or per-API-key request quotas to
            prevent abuse and avoid monopolization of AI system resources.
          - >
            Traffic Shaping: Use dynamic throttling to control bursts of
            traffic and maintain steady system load.
          - >
            Traffic Filtering and Validation: Employ anomaly detection to
            identify traffic indicative of DDoS or abuse, and rigorously
            validate incoming data to filter out malformed or
            resource-intensive inputs.
          - >
            Load Balancing and Redundancy: Distribute traffic intelligently
            across instances and zones, and provide redundant infrastructure
            for failover to maintain uptime during high load or attacks.
          - >
            Edge Protection: Integrate with network-level DDoS protection
            services.
          - >
            Prioritization Policies: Implement QoS tiers so critical
            operations receive priority during congestion.
          - >
            Monitoring and Anomaly Detection: Track performance metrics and
            traffic volume in real time, using ML-based detection to spot
            low-and-slow DDoS attacks or prompt-based abuse.
          - >
            Resource Isolation: Use container-level isolation to protect core
            inference or decision systems from overloaded upstream components.
      - id: AIR-PREV-008.2
        title: Additional Consideration - Prompt Filtering/Firewall
        text: >
          Simple static filters may not suffice against evolving prompt
          injection attacks; use fixed rules as a first filter rather than the
          sole protection, and combine them with adaptive systems that learn
          from traffic patterns, aligning with broader AI firewall strategies
          for layered input validation.
      - id: AIR-PREV-008.3
        title: Reference Implementation
        text: >
          A common approach is to deploy an API gateway and generate API keys
          specific to each use case, which enables:
        recommendations:
          - >
            Revocation of keys on a per-use-case basis to block misbehaving
            applications.
          - >
            Attribution of cost at the use-case level so shared infrastructure
            is funded and ROI can be measured.
          - >
            Prioritization of LLM requests when capacity is saturated and SLAs
            across all consumers cannot be satisfied.
    principles:
      - reference-id: AIR-PRIN
        entries:
          - reference-id: AIR-PRIN-004
            remarks: Layered rate limiting, filtering, isolation, and edge protection provide defense in depth
          - reference-id: AIR-PRIN-005
            remarks: Real-time monitoring and anomaly detection provide operational visibility
    vectors:
      - reference-id: AIR-VEC
        entries:
          - reference-id: AIR-OP-007-01
          - reference-id: AIR-OP-007-02
          - reference-id: AIR-OP-007-03
    state: Active

  - id: AIR-DET-009
    group: DET
    title: AI System Alerting and Denial of Wallet (DoW) / Spend Monitoring
    objective: >
      The consumption-based pricing models common in AI services (especially
      cloud-hosted Large Language Models and compute-intensive AI workloads)
      create unique financial and operational risks. "Denial of Wallet" (DoW)
      attacks specifically target these cost structures by attempting to
      exhaust an organization's AI service budgets through excessive resource
      consumption, potentially leading to service suspension, degraded
      performance, or unexpected financial impact. This control establishes
      comprehensive alerting and spend monitoring mechanisms to detect,
      prevent, and respond to both malicious and accidental overconsumption of
      AI resources, ensuring financial predictability and service
      availability.
    rationale:
      importance: >
        Implementing comprehensive spend monitoring and DoW prevention
        provides critical advantages.
      goals:
        - "Financial Predictability: Prevents unexpected AI service costs that could impact budget and financial planning"
        - "Service Availability: Ensures AI services remain available by preventing budget exhaustion that could lead to service suspension"
        - "Resource Optimization: Enables better understanding and optimization of AI resource consumption patterns"
        - "Security Protection: Detects and mitigates attacks that attempt to exhaust AI service budgets"
        - "Operational Transparency: Provides clear visibility into AI resource usage patterns and costs across the organization"
        - "Compliance Support: Supports financial controls and audit requirements related to technology spending"
        - "Business Enablement: Allows organizations to confidently deploy AI services knowing that costs are monitored and controlled"
    see-also:
      - AIR-PREV-008
      - AIR-DET-004
    statements:
      - id: AIR-DET-009.1
        title: Establish Financial Guardrails
        text: ""
        recommendations:
          - >
            Enterprise-Level Caps: Implement hard spending limits at the
            organizational level through payment providers or cloud service
            billing controls as an ultimate failsafe.
          - >
            Hierarchical Budget Controls: Set up cascading budget limits from
            enterprise → department → project → individual user/API key
            levels.
          - >
            Automated Spend Cutoffs: Configure automatic service suspension or
            throttling when predefined spending thresholds are reached.
      - id: AIR-DET-009.2
        title: Real-time Monitoring and Alerting
        text: ""
        recommendations:
          - >
            Cost Tracking: Implement real-time monitoring of AI service
            consumption costs across all services, projects, and users.
          - >
            Multi-Threshold Alerts: Configure alerts at multiple spending
            levels (e.g., 50%, 75%, 90%, 100% of budget) with escalating
            notification procedures.
          - >
            Anomaly Detection: Deploy systems to detect unusual spending
            patterns that might indicate malicious activity or system
            malfunction.
      - id: AIR-DET-009.3
        title: Granular Resource Controls
        text: ""
        recommendations:
          - >
            API Key Management: Use API gateways to implement per-key quotas
            for:
          - >
            User-Based Quotas: Implement individual user spending and usage
            limits based on roles and business needs.
          - >
            Project-Level Controls: Set resource quotas at the project or
            environment level to prevent any single initiative from consuming
            excessive resources.
      - id: AIR-DET-009.4
        title: Usage Attribution and Accountability
        text: ""
        recommendations:
          - >
            Cost Attribution: Ensure all AI resource consumption can be
            attributed to specific:
          - >
            Chargeback Mechanisms: Implement internal chargeback systems to
            allocate AI costs to the appropriate business units.
      - id: AIR-DET-009.5
        title: Proactive Management and Optimization
        text: ""
        recommendations:
          - >
            Usage Analytics: Regularly analyze spending patterns to identify
            optimization opportunities and predict future resource needs.
          - >
            Right-sizing: Continuously evaluate whether AI resource
            allocations match actual business requirements.
          - >
            Vendor Management: Monitor and negotiate with AI service providers
            to optimize pricing and contract terms.
    principles:
      - reference-id: AIR-PRIN
        entries:
          - reference-id: AIR-PRIN-004
            remarks: Guardrails and granular resource controls form a preventive and detective layer
          - reference-id: AIR-PRIN-005
            remarks: Spend monitoring, attribution, and alerting provide financial and operational auditability
    vectors:
      - reference-id: AIR-VEC
        entries:
          - reference-id: AIR-OP-007-01
          - reference-id: AIR-OP-007-02
          - reference-id: AIR-OP-007-03
