  - id: AIR-DET-011
    group: DET
    title: Human Feedback Loop for AI Systems
    objective: >
      A Human Feedback Loop is a critical detective and continuous improvement
      mechanism that involves systematically collecting, analyzing, and acting
      upon feedback provided by human users, subject matter experts (SMEs), or
      reviewers regarding an AI system's performance, outputs, or behavior. In
      the context of financial institutions, this feedback is invaluable for:
      Monitoring AI System Efficacy: Understanding how well the AI system is
      meeting its objectives in real-world scenarios; Identifying Issues:
      Detecting problems such as inaccuracies, biases, unexpected behaviors
      (ri-5, ri-6), security vulnerabilities (e.g., successful prompt
      injections, data leakage observed by users), usability challenges, or
      instances where the AI generates inappropriate or harmful content;
      Enabling Continuous Improvement: Providing data-driven insights to
      refine AI models, update underlying data (e.g., for RAG systems), tune
      prompts, and enhance user experience; Supporting Incident Response:
      Offering a channel for users to report critical failures or adverse
      impacts, which can trigger incident response processes; Informing
      Governance: Providing qualitative and quantitative data to AI governance
      bodies and ethics committees. This control emphasizes the importance of
      structuring how human insights are captured and integrated into the AI
      system's lifecycle for ongoing refinement and risk management.
    rationale:
      importance: >
        A well-designed human feedback loop provides essential value for AI
        systems in financial services.
      goals:
        - "Performance Improvement: Provides ongoing insights that drive iterative refinement of AI models and systems"
        - "Safety and Risk Detection: Identifies unsafe, biased, or unintended AI behaviors not caught during testing"
        - "Human Alignment: Ensures AI systems remain aligned with human values and ethical considerations"
        - "User Trust: Builds trust when users see their feedback is valued and acted upon"
        - "Vulnerability Discovery: Users often discover novel failures or vulnerabilities through real-world interaction"
        - "Governance Support: Provides data for AI governance bodies to monitor impact and make decisions"
        - "Cost Reduction: Proactively addresses issues, reducing costs from AI failures and poor decisions"
    see-also:
      - AIR-DET-015
      - AIR-DET-004
    statements:
      - id: AIR-DET-011.1
        title: Designing the Feedback Mechanism
        text: ""
        recommendations:
          - >
            Define Intended Use and KPIs:; Objectives:; KPI Alignment:
          - >
            User Experience (UX) Considerations:; Ease of Use:; Willingness to
            Participate:
          - >
            Determine Feedback Scope (Wide vs. Narrow):; Wide Feedback:;
            Narrow Feedback:
