  - id: AIR-PREV-012
    group: PREV
    title: Role-Based Access Control for AI Data
    objective: >
      Role-Based Access Control (RBAC) is a fundamental security mechanism
      designed to ensure that users, AI models, and other systems are granted
      access only to the specific data assets and functionalities necessary to
      perform their authorized tasks. Within the context of AI systems in a
      financial institution, RBAC is critical for protecting the
      confidentiality, integrity, and availability of data used throughout the
      AI lifecycle – from data sourcing and preparation to model training,
      validation, deployment, and operation. This control ensures that access
      to sensitive information is strictly managed based on defined roles and
      responsibilities.
    rationale:
      importance: >
        Implementing robust Role-Based Access Control for AI data provides
        significant advantages to financial institutions.
      goals:
        - "Data Protection: Safeguards sensitive data from unauthorized access and reduces breach risks"
        - "Data Poisoning Mitigation: Limits access to training datasets, reducing attack surfaces for data poisoning"
        - "Regulatory Compliance: Meets requirements for controlled access to sensitive and personal information"
        - "Internal Controls: Reinforces security posture and demonstrates due diligence in data management"
        - "Insider Threat Reduction: Limits impact of malicious insiders through role-based access restrictions"
        - "Auditability: Provides clear trails of data access for compliance reporting and investigations"
        - "Operational Efficiency: Streamlines access management through role-level permission administration"
    see-also:
      - AIR-DET-016
      - AIR-PREV-006
    statements:
      - id: AIR-PREV-012.1
        title: Define Roles and Responsibilities for AI Data Access
        text: ""
        recommendations:
          - >
            Identify Entities: Systematically identify all human roles and
            non-human entities (e.g., AI models, MLOps pipelines, service
            accounts) that require access to data used by, or generated from,
            AI systems.
          - >
            Document Access Needs: For each identified role/entity,
            meticulously document the specific data access requirements (e.g.,
            read, write, modify, delete, execute) based on their tasks and
            responsibilities across the different phases of the AI lifecycle
            (e.g., data collection, annotation, model training, validation,
            inference, monitoring). (Aligns with ISO 42001 A.3.2)
      - id: AIR-PREV-012.2
        title: Data Discovery, Classification, and Inventory
        text: ""
        recommendations:
          - >
            Data Asset Inventory: Maintain a comprehensive inventory of all
            data assets relevant to AI systems, including datasets, databases,
            data streams, model artifacts, and configuration files.
          - >
            Data Classification: Ensure all data is classified according to
            the institution's data sensitivity scheme (e.g., Public, Internal,
            Confidential, Highly Restricted). This classification is
            fundamental to determining appropriate access controls. (Aligns
            with ISO 42001 A.7.2)
      - id: AIR-PREV-012.3
        title: Develop and Maintain an Access Control Matrix
        text: ""
        recommendations:
          - >
            Mapping Roles to Data: Create and regularly update an access
            control matrix (or equivalent policy documentation) that clearly
            maps the defined roles to specific data categories/assets and the
            corresponding permitted access levels. This matrix serves as the
            blueprint for configuring technical controls.
      - id: AIR-PREV-012.4
        title: Implement Technical Access Controls
        text: ""
        recommendations:
          - >
            Multi-Layered Enforcement: Enforce RBAC policies at all relevant
            layers where AI data is stored, processed, transmitted, or
            accessed:; Data Repositories:; AI/ML Platforms & Tools:; APIs:;
            Applications:
      - id: AIR-PREV-012.5
        title: Employ Strong Authentication and Authorization Mechanisms
        text: ""
        recommendations:
          - >
            Authentication: Mandate strong authentication methods for all
            entities accessing AI data. This includes multi-factor
            authentication (MFA) for human users and robust, managed
            credentials (e.g., certificates, API keys, service principals) for
            applications, AI models, and system accounts.
          - >
            Authorization: Implement rigorous authorization mechanisms that
            verify an authenticated identity's permissions against the defined
            access control matrix before granting access to specific data or
            functions.
          - >
            Attestation for Systems: For critical systems or sensitive data
            access (e.g., data stored in encrypted file systems or specialized
            AI data stores), consider requiring systems (including AI models
            or processing components) to prove their identity and
            authorization status through robust attestation mechanisms
            (hardware-based or software-based) before they can process, train
            with, or retrieve data.
      - id: AIR-PREV-012.6
        title: Conduct Regular Access Reviews and Recertification
        text: ""
        recommendations:
          - >
            Periodic Reviews: Establish a formal process for periodic review
            (e.g., quarterly, semi-annually) and recertification of all access
            rights by data owners, business managers, or system owners.
          - >
            Timely Adjustments: Ensure that access permissions are promptly
            updated or revoked when an individual's role changes, they leave
            the organization, or a system's function is modified or
            decommissioned.
      - id: AIR-PREV-012.7
        title: Manage Access for Non-Human Identities
        text: ""
        recommendations:
          - >
            Principle of Least Privilege for Systems: Treat AI models, MLOps
            pipelines, automation scripts, and other non-human entities as
            distinct identities. Assign them specific roles and grant them
            only the minimum necessary permissions to perform their automated
            tasks.
          - >
            Secure Credential Management: Implement secure practices for
            managing the lifecycle of credentials (e.g., secrets management,
            regular rotation) used by these non-human identities.
      - id: AIR-PREV-012.8
        title: Log and Monitor Data Access
        text: ""
        recommendations:
          - >
            Comprehensive Logging: Implement detailed logging of all data
            access attempts, including successful accesses and denied
            attempts. Logs should record the identity, data accessed, type of
            access, and timestamp.
          - >
            Security Monitoring: Regularly monitor access logs for anomalous
            activities, patterns of unauthorized access attempts, or other
            potential security policy violations.
    principles:
      - reference-id: AIR-PRIN
        entries:
          - reference-id: AIR-PRIN-002
            remarks: Access decisions are driven by data classification
          - reference-id: AIR-PRIN-003
            remarks: Least-privilege access limits exposure of AI data
          - reference-id: AIR-PRIN-005
            remarks: Access logging and recertification provide auditability
